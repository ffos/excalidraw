name = "excalidraw-worker"
main = "workers/src/index.ts"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]

[build]
command = "yarn build:app"

[[kv_namespaces]]
binding = "SCENES"
id = "REPLACE_WITH_KV_NAMESPACE_ID"
preview_id = "REPLACE_WITH_KV_PREVIEW_NAMESPACE_ID"

[[r2_buckets]]
binding = "FILES"
bucket_name = "excalidraw-files"
preview_bucket_name = "excalidraw-files-preview"

[[durable_objects.bindings]]
name = "ROOMS"
class_name = "CollabRoom"

[[migrations]]
tag = "v1"
new_classes = ["CollabRoom"]

[vars]
ENVIRONMENT = "production"

# Cloudflare Pages config (static assets)
[site]
bucket = "./excalidraw-app/build"
